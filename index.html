<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>XNOLAB Crew</title>
<style>
:root {
  --bg: #F2F2F7;
  --bg-elevated: #FFFFFF;
  --card: #FFFFFF;
  --text: #1C1C1E;
  --text-2: #8E8E93;
  --text-3: #C7C7CC;
  --border: rgba(60, 60, 67, 0.12);
  --separator: rgba(60, 60, 67, 0.18);
  --primary: #007AFF;
  --primary-dim: rgba(0, 122, 255, 0.12);
  --danger: #FF3B30;
  --danger-dim: rgba(255, 59, 48, 0.12);
  --success: #34C759;
  --success-dim: rgba(52, 199, 89, 0.12);
  --warning: #FF9500;
  --warning-dim: rgba(255, 149, 0, 0.12);
  --purple: #AF52DE;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --tab-h: 56px;
  --safe-bottom: env(safe-area-inset-bottom, 0);
  --safe-top: env(safe-area-inset-top, 0);
}
[data-theme="dark"] {
  --bg: #000000;
  --bg-elevated: #1C1C1E;
  --card: #1C1C1E;
  --text: #FFFFFF;
  --text-2: #8E8E93;
  --text-3: #48484A;
  --border: rgba(84, 84, 88, 0.34);
  --separator: rgba(84, 84, 88, 0.5);
  --primary-dim: rgba(10, 132, 255, 0.18);
  --primary: #0A84FF;
  --danger: #FF453A;
  --danger-dim: rgba(255, 69, 58, 0.18);
  --success: #30D158;
  --success-dim: rgba(48, 209, 88, 0.18);
  --warning: #FF9F0A;
  --warning-dim: rgba(255, 159, 10, 0.18);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
  background: var(--bg); color: var(--text);
  font-size: 16px; line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: contain;
}
button, input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
button { background: none; border: none; cursor: pointer; padding: 0; }
input, select, textarea { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; color: var(--text); width: 100%; outline: none; transition: border-color 0.15s; }
input:focus, select:focus, textarea:focus { border-color: var(--primary); }
textarea { resize: vertical; min-height: 80px; }
.hidden { display: none !important; }

/* ---- Login ---- */
#login {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex; flex-direction: column;
  justify-content: center; padding: 32px 24px;
  padding-top: calc(32px + var(--safe-top));
}
.login-brand { text-align: center; margin-bottom: 36px; }
.login-logo {
  width: 72px; height: 72px; border-radius: 18px;
  background: linear-gradient(135deg, #007AFF, #AF52DE);
  display: inline-flex; align-items: center; justify-content: center;
  color: white; font-size: 32px; font-weight: 700;
  letter-spacing: -1px; margin-bottom: 16px;
  box-shadow: 0 8px 24px rgba(0,122,255,0.25);
}
.login-brand h1 { font-size: 28px; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.4px; }
.login-brand p { color: var(--text-2); margin: 0; font-size: 15px; }
.login-card {
  background: var(--card); border-radius: var(--radius-lg);
  padding: 24px; max-width: 420px; width: 100%;
  margin: 0 auto;
}
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 13px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.3px; }
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px; padding: 14px 20px; border-radius: var(--radius-sm);
  background: var(--primary); color: white; font-weight: 600; font-size: 16px;
  width: 100%; transition: opacity 0.15s, transform 0.05s;
}
.btn:active { opacity: 0.85; transform: scale(0.99); }
.btn-secondary { background: var(--bg-elevated); color: var(--text); border: 1px solid var(--border); }
.btn-danger { background: var(--danger); color: white; }
.btn-ghost { background: transparent; color: var(--primary); }
.login-error { color: var(--danger); font-size: 14px; text-align: center; margin-top: 12px; min-height: 18px; }

/* ---- App layout ---- */
#app { padding-bottom: calc(var(--tab-h) + var(--safe-bottom) + 16px); min-height: 100vh; min-height: 100dvh; }
.appbar {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg-elevated);
  border-bottom: 0.5px solid var(--separator);
  padding: calc(var(--safe-top) + 8px) 16px 8px;
  display: flex; align-items: center; justify-content: space-between;
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
}
.appbar h1 { font-size: 20px; font-weight: 700; margin: 0; letter-spacing: -0.3px; }
.appbar-actions { display: flex; gap: 4px; }
.icon-btn {
  width: 36px; height: 36px; border-radius: 10px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--primary); font-size: 18px;
}
.icon-btn:active { background: var(--primary-dim); }

.avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  color: white; font-weight: 600; font-size: 14px;
  flex-shrink: 0; letter-spacing: 0.2px;
}
.avatar-xno { background: linear-gradient(135deg, #007AFF, #5856D6); }
.avatar-ha { background: linear-gradient(135deg, #34C759, #00C7BE); }
.avatar-nn { background: linear-gradient(135deg, #FF2D55, #FF9500); }

.view { padding: 16px; max-width: 720px; margin: 0 auto; }
.view-subtitle { color: var(--text-2); font-size: 14px; margin: 0 0 16px; }
.section-title { font-size: 13px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.4px; margin: 24px 0 8px; padding: 0 4px; }

/* ---- Cards ---- */
.card {
  background: var(--card); border-radius: var(--radius);
  padding: 16px; margin-bottom: 12px;
}
.summary-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 12px;
}
.stat-card {
  background: var(--card); border-radius: var(--radius);
  padding: 14px;
}
.stat-card .stat-label { font-size: 12px; color: var(--text-2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
.stat-card .stat-value { font-size: 32px; font-weight: 700; line-height: 1.1; margin-top: 4px; letter-spacing: -0.5px; }
.stat-card .stat-meta { font-size: 12px; color: var(--text-2); margin-top: 2px; }
.stat-card.accent-danger .stat-value { color: var(--danger); }
.stat-card.accent-success .stat-value { color: var(--success); }
.stat-card.accent-warning .stat-value { color: var(--warning); }
.stat-card.accent-primary .stat-value { color: var(--primary); }

/* ---- Task list & item ---- */
.task-list { display: flex; flex-direction: column; gap: 10px; }
.task-item {
  background: var(--card); border-radius: var(--radius);
  padding: 14px; display: flex; gap: 12px; align-items: flex-start;
  cursor: pointer; transition: transform 0.05s;
  border-left: 3px solid transparent;
}
.task-item:active { transform: scale(0.99); }
.task-item.priority-high { border-left-color: var(--danger); }
.task-item.priority-medium { border-left-color: var(--warning); }
.task-item.priority-low { border-left-color: var(--primary); }
.task-item.is-done { opacity: 0.55; }
.task-item.is-done .task-title { text-decoration: line-through; }
.task-checkbox {
  width: 24px; height: 24px; border-radius: 50%;
  border: 1.8px solid var(--text-3);
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
  transition: all 0.15s;
}
.task-checkbox.done {
  background: var(--success); border-color: var(--success);
  color: white; font-size: 13px; font-weight: 700;
}
.task-body { flex: 1; min-width: 0; }
.task-title { font-size: 16px; font-weight: 600; margin: 0; letter-spacing: -0.1px; }
.task-desc { font-size: 14px; color: var(--text-2); margin: 4px 0 0; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.task-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; align-items: center; }
.tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; font-weight: 600;
  padding: 3px 8px; border-radius: 6px;
}
.tag-status { background: var(--bg); color: var(--text-2); }
.tag-priority-high { background: var(--danger-dim); color: var(--danger); }
.tag-priority-medium { background: var(--warning-dim); color: var(--warning); }
.tag-priority-low { background: var(--primary-dim); color: var(--primary); }
.tag-due { background: var(--bg); color: var(--text-2); }
.tag-due.overdue { background: var(--danger-dim); color: var(--danger); }
.tag-due.today { background: var(--warning-dim); color: var(--warning); }

.empty-state {
  text-align: center; padding: 48px 20px; color: var(--text-2);
}
.empty-state .emoji { font-size: 40px; display: block; margin-bottom: 8px; opacity: 0.7; }
.empty-state p { margin: 0; font-size: 15px; }

/* ---- Status filter / segmented ---- */
.segmented {
  display: flex; background: var(--bg);
  border-radius: 9px; padding: 2px; gap: 2px;
  margin-bottom: 14px;
}
.segmented button {
  flex: 1; padding: 7px 4px; border-radius: 7px;
  font-size: 13px; font-weight: 600; color: var(--text);
}
.segmented button.active {
  background: var(--card); box-shadow: 0 1px 2px rgba(0,0,0,0.08);
}
.segmented button .count { color: var(--text-2); font-weight: 500; margin-left: 3px; }

/* ---- FAB ---- */
.fab {
  position: fixed;
  bottom: calc(var(--tab-h) + var(--safe-bottom) + 16px); right: 16px;
  width: 56px; height: 56px; border-radius: 28px;
  background: var(--primary); color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 300; line-height: 1;
  box-shadow: 0 6px 20px rgba(0, 122, 255, 0.35);
  z-index: 60;
}
.fab:active { transform: scale(0.95); }

/* ---- Bottom tab ---- */
.tabbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--tab-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: var(--bg-elevated);
  border-top: 0.5px solid var(--separator);
  display: flex; z-index: 50;
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
}
.tabbar button {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 2px;
  color: var(--text-2); font-size: 10px; font-weight: 500;
}
.tabbar button.active { color: var(--primary); }
.tabbar .tab-icon { font-size: 22px; line-height: 1; }

/* ---- Modal / sheet ---- */
.sheet-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 100; display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.sheet-backdrop.open { opacity: 1; pointer-events: auto; }
.sheet {
  background: var(--bg); width: 100%; max-width: 600px;
  margin: 0 auto; border-radius: 16px 16px 0 0;
  padding: 8px 16px calc(20px + var(--safe-bottom));
  max-height: 92vh; max-height: 92dvh; overflow-y: auto;
  transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
}
.sheet-backdrop.open .sheet { transform: translateY(0); }
.sheet-handle {
  width: 36px; height: 5px; background: var(--text-3);
  border-radius: 3px; margin: 6px auto 12px;
}
.sheet-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px;
}
.sheet-header h2 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.2px; }
.sheet-actions { display: flex; gap: 10px; margin-top: 16px; }
.sheet-actions .btn { flex: 1; }

/* ---- Capacity ---- */
.capacity-row {
  display: flex; gap: 12px; align-items: center;
  padding: 14px 0; border-bottom: 0.5px solid var(--separator);
}
.capacity-row:last-child { border-bottom: none; }
.capacity-info { flex: 1; min-width: 0; }
.capacity-name { font-size: 15px; font-weight: 600; margin: 0; }
.capacity-role { font-size: 13px; color: var(--text-2); margin: 1px 0 0; }
.capacity-meter {
  height: 6px; background: var(--bg); border-radius: 3px;
  overflow: hidden; margin-top: 6px;
}
.capacity-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width 0.3s; }
.capacity-fill.high { background: var(--warning); }
.capacity-fill.over { background: var(--danger); }
.capacity-stat {
  text-align: right; font-size: 13px; color: var(--text-2);
  white-space: nowrap;
}
.capacity-stat strong { color: var(--text); font-size: 17px; font-weight: 700; }

/* ---- Summary view ---- */
.summary-section { margin-bottom: 20px; }
.summary-section h3 {
  font-size: 13px; font-weight: 600; color: var(--text-2);
  text-transform: uppercase; letter-spacing: 0.4px;
  margin: 0 0 8px; padding: 0 4px;
  display: flex; align-items: center; gap: 6px;
}
.summary-section h3 .badge {
  background: var(--text-3); color: var(--bg-elevated);
  font-size: 11px; font-weight: 700; padding: 1px 7px;
  border-radius: 10px; text-transform: none; letter-spacing: 0;
}

@media (min-width: 600px) {
  .summary-grid { grid-template-columns: repeat(4, 1fr); }
}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<section id="login">
  <div class="login-brand">
    <div class="login-logo">XL</div>
    <h1>XNOLAB Crew</h1>
    <p>Task management for the team</p>
  </div>
  <div class="login-card">
    <form id="loginForm">
      <div class="field">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" type="email" autocomplete="username" required placeholder="you@xnolab.com">
      </div>
      <div class="field">
        <label for="loginPw">Password</label>
        <input id="loginPw" type="password" autocomplete="current-password" required placeholder="••••••••">
      </div>
      <button class="btn" type="submit">Sign in</button>
      <div class="login-error" id="loginError"></div>
    </form>
  </div>
</section>

<!-- ============ APP ============ -->
<main id="app" class="hidden">
  <header class="appbar">
    <h1 id="viewTitle">Dashboard</h1>
    <div class="appbar-actions">
      <button class="icon-btn" id="themeToggle" title="Toggle theme">◐</button>
      <button class="icon-btn" id="logoutBtn" title="Sign out">⎋</button>
    </div>
  </header>

  <!-- Dashboard -->
  <section class="view" id="view-dashboard">
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:16px;">
      <div class="avatar" id="dashAvatar"></div>
      <div>
        <div style="font-size:22px; font-weight:700; letter-spacing:-0.3px;" id="dashGreeting">Hello</div>
        <div style="color:var(--text-2); font-size:13px;" id="dashRole"></div>
      </div>
    </div>

    <div class="summary-grid" id="dashStats"></div>

    <div class="section-title">Up next</div>
    <div class="task-list" id="dashUpNext"></div>

    <div class="section-title">Overdue</div>
    <div class="task-list" id="dashOverdue"></div>
  </section>

  <!-- Tasks -->
  <section class="view hidden" id="view-tasks">
    <div class="segmented" id="statusFilter">
      <button data-status="all" class="active">All <span class="count" id="cnt-all"></span></button>
      <button data-status="todo">Todo <span class="count" id="cnt-todo"></span></button>
      <button data-status="inprogress">In&nbsp;Progress <span class="count" id="cnt-inprogress"></span></button>
      <button data-status="review">Review <span class="count" id="cnt-review"></span></button>
      <button data-status="done">Done <span class="count" id="cnt-done"></span></button>
    </div>
    <div class="task-list" id="taskList"></div>
  </section>

  <!-- Capacity -->
  <section class="view hidden" id="view-capacity">
    <p class="view-subtitle">Active workload across the team. Counts exclude completed tasks.</p>
    <div class="card" id="capacityList"></div>
    <div class="section-title">Workload by priority</div>
    <div class="card" id="priorityBreakdown"></div>
  </section>

  <!-- Summary -->
  <section class="view hidden" id="view-summary">
    <p class="view-subtitle" id="summaryDate"></p>
    <div class="summary-section">
      <h3>Due today <span class="badge" id="badge-today">0</span></h3>
      <div class="task-list" id="sum-today"></div>
    </div>
    <div class="summary-section">
      <h3>Overdue <span class="badge" id="badge-overdue">0</span></h3>
      <div class="task-list" id="sum-overdue"></div>
    </div>
    <div class="summary-section">
      <h3>In progress <span class="badge" id="badge-inprogress">0</span></h3>
      <div class="task-list" id="sum-inprogress"></div>
    </div>
    <div class="summary-section">
      <h3>Completed today <span class="badge" id="badge-done">0</span></h3>
      <div class="task-list" id="sum-done"></div>
    </div>
  </section>

  <button class="fab" id="fabAdd" title="New task">+</button>

  <nav class="tabbar">
    <button data-view="dashboard" class="active"><span class="tab-icon">▦</span><span>Dashboard</span></button>
    <button data-view="tasks"><span class="tab-icon">☰</span><span>Tasks</span></button>
    <button data-view="capacity"><span class="tab-icon">◴</span><span>Capacity</span></button>
    <button data-view="summary"><span class="tab-icon">✦</span><span>Today</span></button>
  </nav>
</main>

<!-- ============ TASK SHEET ============ -->
<div class="sheet-backdrop" id="taskSheet">
  <div class="sheet" role="dialog" aria-modal="true">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 id="taskSheetTitle">New task</h2>
      <button class="btn-ghost" id="taskSheetClose" style="font-size:16px; font-weight:600;">Close</button>
    </div>
    <form id="taskForm">
      <div class="field">
        <label for="tTitle">Title</label>
        <input id="tTitle" type="text" required maxlength="120" placeholder="What needs to be done?">
      </div>
      <div class="field">
        <label for="tDesc">Description</label>
        <textarea id="tDesc" maxlength="600" placeholder="Notes, context, links…"></textarea>
      </div>
      <div class="field">
        <label for="tAssignee">Assignee</label>
        <select id="tAssignee" required></select>
      </div>
      <div class="field">
        <label for="tStatus">Status</label>
        <select id="tStatus">
          <option value="todo">Todo</option>
          <option value="inprogress">In Progress</option>
          <option value="review">Review</option>
          <option value="done">Done</option>
        </select>
      </div>
      <div class="field">
        <label for="tPriority">Priority</label>
        <select id="tPriority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      <div class="field">
        <label for="tDue">Due date</label>
        <input id="tDue" type="date">
      </div>
      <div class="sheet-actions">
        <button type="button" class="btn btn-danger hidden" id="tDelete">Delete</button>
        <button type="submit" class="btn">Save</button>
      </div>
    </form>
  </div>
</div>

<script>
"use strict";

const USERS = [
  { id: "xno", name: "Xno",       role: "Admin",            email: "xno@xnolab.com",         pw: "xnolab2026", avatar: "avatar-xno", initials: "XN" },
  { id: "ha",  name: "Hoang Anh", role: "3D Specialist",    email: "hoanganh@ortho.fashion", pw: "ortho2026",  avatar: "avatar-ha",  initials: "HA" },
  { id: "nn",  name: "Ngoc Nhi",  role: "Fashion Designer", email: "nhi@ortho.fashion",      pw: "ortho2026",  avatar: "avatar-nn",  initials: "NN" },
];
const userById = id => USERS.find(u => u.id === id);
const userByEmail = e => USERS.find(u => u.email.toLowerCase() === e.toLowerCase());

const LS = { session: "xnolab.session", tasks: "xnolab.tasks.v1", theme: "xnolab.theme" };

const state = { user: null, tasks: [], view: "dashboard", filter: "all", editingId: null };

function seedTasks() {
  const today = new Date();
  const fmt = d => d.toISOString().slice(0, 10);
  const offset = (n) => { const d = new Date(today); d.setDate(d.getDate() + n); return fmt(d); };
  return [
    { id: uid(), title: "Review Q2 collection moodboard", desc: "Pull references and sign off on the spring direction.", assignee: "nn", status: "inprogress", priority: "high", due: offset(0), createdAt: Date.now() - 86400000 * 3 },
    { id: uid(), title: "Iterate sneaker midsole geometry", desc: "Tighten the heel curve and re-export STL.", assignee: "ha", status: "todo", priority: "medium", due: offset(2), createdAt: Date.now() - 86400000 * 2 },
    { id: uid(), title: "Brand deck for partner pitch", desc: "Update slides 4–9 with the new visual identity.", assignee: "xno", status: "review", priority: "high", due: offset(-1), createdAt: Date.now() - 86400000 * 5 },
    { id: uid(), title: "Texture pass on outerwear samples", desc: "Substance bake plus 4K diffuse maps.", assignee: "ha", status: "todo", priority: "low", due: offset(5), createdAt: Date.now() - 86400000 },
    { id: uid(), title: "Tech-pack for capsule drop", desc: "Spec sheets ready for the factory hand-off.", assignee: "nn", status: "done", priority: "medium", due: offset(-2), createdAt: Date.now() - 86400000 * 6 },
  ];
}

function uid() { return "t_" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4); }
function todayISO() { return new Date().toISOString().slice(0, 10); }
function escapeHtml(s) { return (s ?? "").replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m])); }
function fmtDate(iso) {
  if (!iso) return "";
  const d = new Date(iso + "T00:00");
  const today = new Date(); today.setHours(0,0,0,0);
  const dd = new Date(d); dd.setHours(0,0,0,0);
  const diffDays = Math.round((dd - today) / 86400000);
  if (diffDays === 0) return "Today";
  if (diffDays === 1) return "Tomorrow";
  if (diffDays === -1) return "Yesterday";
  if (diffDays > 1 && diffDays < 7) return d.toLocaleDateString(undefined, { weekday: "short" });
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
}
function dueState(iso, status) {
  if (!iso || status === "done") return "";
  const today = todayISO();
  if (iso < today) return "overdue";
  if (iso === today) return "today";
  return "";
}
const STATUS_LABEL = { todo: "Todo", inprogress: "In Progress", review: "Review", done: "Done" };
const PRIORITY_LABEL = { low: "Low", medium: "Medium", high: "High" };

function loadTasks() {
  try {
    const raw = localStorage.getItem(LS.tasks);
    if (raw) return JSON.parse(raw);
  } catch (_) {}
  const seeded = seedTasks();
  state.tasks = seeded;
  saveTasks();
  return seeded;
}
function saveTasks() {
  localStorage.setItem(LS.tasks, JSON.stringify(state.tasks));
}
function loadSession() {
  try {
    const id = localStorage.getItem(LS.session);
    return id ? userById(id) : null;
  } catch (_) { return null; }
}

const $login = document.getElementById("login");
const $app = document.getElementById("app");
const $loginForm = document.getElementById("loginForm");
const $loginError = document.getElementById("loginError");

$loginForm.addEventListener("submit", (e) => {
  e.preventDefault();
  const email = document.getElementById("loginEmail").value.trim();
  const pw = document.getElementById("loginPw").value;
  const u = userByEmail(email);
  if (!u || u.pw !== pw) {
    $loginError.textContent = "Wrong email or password.";
    return;
  }
  $loginError.textContent = "";
  localStorage.setItem(LS.session, u.id);
  state.user = u;
  document.getElementById("loginPw").value = "";
  enterApp();
});

document.getElementById("logoutBtn").addEventListener("click", () => {
  localStorage.removeItem(LS.session);
  state.user = null;
  $app.classList.add("hidden");
  $login.classList.remove("hidden");
});

function enterApp() {
  $login.classList.add("hidden");
  $app.classList.remove("hidden");
  state.tasks = loadTasks();
  populateAssigneeOptions();
  switchView("dashboard");
}

const $themeBtn = document.getElementById("themeToggle");
function applyTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
  localStorage.setItem(LS.theme, t);
}
function initTheme() {
  const saved = localStorage.getItem(LS.theme);
  if (saved) { applyTheme(saved); return; }
  const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
  applyTheme(prefersDark ? "dark" : "light");
}
$themeBtn.addEventListener("click", () => {
  const cur = document.documentElement.getAttribute("data-theme");
  applyTheme(cur === "dark" ? "light" : "dark");
});

const VIEW_TITLES = { dashboard: "Dashboard", tasks: "Tasks", capacity: "Capacity", summary: "Today" };
function switchView(name) {
  state.view = name;
  document.getElementById("viewTitle").textContent = VIEW_TITLES[name];
  document.querySelectorAll("#app > .view").forEach(v => v.classList.add("hidden"));
  document.getElementById("view-" + name).classList.remove("hidden");
  document.querySelectorAll(".tabbar button").forEach(b => b.classList.toggle("active", b.dataset.view === name));
  render();
  window.scrollTo(0, 0);
}
document.querySelectorAll(".tabbar button").forEach(b => {
  b.addEventListener("click", () => switchView(b.dataset.view));
});

function visibleTasks() {
  if (!state.user) return [];
  return state.user.role === "Admin"
    ? state.tasks
    : state.tasks.filter(t => t.assignee === state.user.id);
}

function taskItemHTML(t) {
  const a = userById(t.assignee);
  const dState = dueState(t.due, t.status);
  const dTagClass = dState ? `tag-due ${dState}` : "tag-due";
  return `
    <div class="task-item priority-${t.priority} ${t.status === "done" ? "is-done" : ""}" data-id="${t.id}">
      <div class="task-checkbox ${t.status === "done" ? "done" : ""}" data-toggle="${t.id}">${t.status === "done" ? "✓" : ""}</div>
      <div class="task-body">
        <div class="task-title">${escapeHtml(t.title)}</div>
        ${t.desc ? `<div class="task-desc">${escapeHtml(t.desc)}</div>` : ""}
        <div class="task-meta">
          <span class="tag tag-status">${STATUS_LABEL[t.status]}</span>
          <span class="tag tag-priority-${t.priority}">${PRIORITY_LABEL[t.priority]}</span>
          ${t.due ? `<span class="tag ${dTagClass}">${fmtDate(t.due)}</span>` : ""}
          ${a ? `<span class="tag tag-status" title="${escapeHtml(a.name)}">${a.initials}</span>` : ""}
        </div>
      </div>
    </div>`;
}

function bindTaskItems(container) {
  container.querySelectorAll("[data-id]").forEach(el => {
    el.addEventListener("click", (e) => {
      if (e.target.dataset.toggle) return;
      openSheet(el.dataset.id);
    });
  });
  container.querySelectorAll("[data-toggle]").forEach(el => {
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      toggleDone(el.dataset.toggle);
    });
  });
}

function renderDashboard() {
  const u = state.user;
  document.getElementById("dashAvatar").className = "avatar " + u.avatar;
  document.getElementById("dashAvatar").textContent = u.initials;
  document.getElementById("dashGreeting").textContent = greeting(u.name);
  document.getElementById("dashRole").textContent = u.role + (u.role === "Admin" ? " · sees all tasks" : "");

  const tasks = visibleTasks();
  const open = tasks.filter(t => t.status !== "done");
  const today = todayISO();
  const overdue = open.filter(t => t.due && t.due < today);
  const dueToday = open.filter(t => t.due === today);
  const weekStart = new Date(); weekStart.setDate(weekStart.getDate() - 6);
  const wsISO = weekStart.toISOString().slice(0, 10);
  const doneThisWeek = tasks.filter(t => t.status === "done" && (!t.due || t.due >= wsISO));

  document.getElementById("dashStats").innerHTML = `
    <div class="stat-card accent-primary">
      <div class="stat-label">Open</div>
      <div class="stat-value">${open.length}</div>
      <div class="stat-meta">${u.role === "Admin" ? "All team" : "Your tasks"}</div>
    </div>
    <div class="stat-card accent-warning">
      <div class="stat-label">Due today</div>
      <div class="stat-value">${dueToday.length}</div>
      <div class="stat-meta">${dueToday.length ? "On the line" : "All clear"}</div>
    </div>
    <div class="stat-card accent-danger">
      <div class="stat-label">Overdue</div>
      <div class="stat-value">${overdue.length}</div>
      <div class="stat-meta">${overdue.length ? "Needs attention" : "Nothing slipping"}</div>
    </div>
    <div class="stat-card accent-success">
      <div class="stat-label">Done this week</div>
      <div class="stat-value">${doneThisWeek.length}</div>
      <div class="stat-meta">Last 7 days</div>
    </div>
  `;

  const upNext = open
    .filter(t => !overdue.includes(t))
    .sort((a, b) => (a.due || "9999").localeCompare(b.due || "9999") || prioRank(b.priority) - prioRank(a.priority))
    .slice(0, 5);
  const upEl = document.getElementById("dashUpNext");
  upEl.innerHTML = upNext.length
    ? upNext.map(taskItemHTML).join("")
    : `<div class="empty-state"><span class="emoji">✶</span><p>No upcoming tasks. Nice.</p></div>`;
  bindTaskItems(upEl);

  const ovEl = document.getElementById("dashOverdue");
  ovEl.innerHTML = overdue.length
    ? overdue.sort((a, b) => a.due.localeCompare(b.due)).map(taskItemHTML).join("")
    : `<div class="empty-state"><span class="emoji">○</span><p>Nothing overdue.</p></div>`;
  bindTaskItems(ovEl);
}

function greeting(name) {
  const h = new Date().getHours();
  const part = h < 5 ? "Hello" : h < 12 ? "Good morning" : h < 18 ? "Good afternoon" : "Good evening";
  return `${part}, ${name.split(" ")[0]}`;
}
function prioRank(p) { return p === "high" ? 3 : p === "medium" ? 2 : 1; }

function renderTasks() {
  const all = visibleTasks();
  const counts = { all: all.length, todo: 0, inprogress: 0, review: 0, done: 0 };
  all.forEach(t => counts[t.status]++);
  for (const k of Object.keys(counts)) {
    const el = document.getElementById("cnt-" + k);
    if (el) el.textContent = counts[k] ? counts[k] : "";
  }

  const f = state.filter;
  let list = f === "all" ? all : all.filter(t => t.status === f);
  list = list.slice().sort((a, b) => {
    const ad = a.due || "9999-12-31";
    const bd = b.due || "9999-12-31";
    if (ad !== bd) return ad.localeCompare(bd);
    return prioRank(b.priority) - prioRank(a.priority);
  });

  const el = document.getElementById("taskList");
  if (!list.length) {
    el.innerHTML = `<div class="empty-state"><span class="emoji">✦</span><p>No tasks here yet.</p></div>`;
    return;
  }
  el.innerHTML = list.map(taskItemHTML).join("");
  bindTaskItems(el);
}

document.querySelectorAll("#statusFilter button").forEach(b => {
  b.addEventListener("click", () => {
    state.filter = b.dataset.status;
    document.querySelectorAll("#statusFilter button").forEach(x => x.classList.toggle("active", x === b));
    renderTasks();
  });
});

function renderCapacity() {
  const all = state.tasks;
  const open = all.filter(t => t.status !== "done");
  const max = Math.max(1, ...USERS.map(u => open.filter(t => t.assignee === u.id).length));

  const rows = USERS.map(u => {
    const mine = open.filter(t => t.assignee === u.id);
    const overdue = mine.filter(t => t.due && t.due < todayISO()).length;
    const pct = Math.round((mine.length / max) * 100);
    const cls = mine.length >= 5 ? "over" : mine.length >= 3 ? "high" : "";
    return `
      <div class="capacity-row">
        <div class="avatar ${u.avatar}">${u.initials}</div>
        <div class="capacity-info">
          <p class="capacity-name">${escapeHtml(u.name)}</p>
          <p class="capacity-role">${escapeHtml(u.role)}${overdue ? ` · <span style="color:var(--danger)">${overdue} overdue</span>` : ""}</p>
          <div class="capacity-meter"><div class="capacity-fill ${cls}" style="width:${pct}%"></div></div>
        </div>
        <div class="capacity-stat"><strong>${mine.length}</strong><br>active</div>
      </div>`;
  }).join("");
  document.getElementById("capacityList").innerHTML = rows;

  const prio = { high: 0, medium: 0, low: 0 };
  open.forEach(t => prio[t.priority]++);
  const totalP = prio.high + prio.medium + prio.low || 1;
  document.getElementById("priorityBreakdown").innerHTML = `
    <div style="display:flex; gap:6px; height:10px; border-radius:5px; overflow:hidden;">
      <div style="background:var(--danger); flex:${prio.high || 0.001};"></div>
      <div style="background:var(--warning); flex:${prio.medium || 0.001};"></div>
      <div style="background:var(--primary); flex:${prio.low || 0.001};"></div>
    </div>
    <div style="display:flex; justify-content:space-between; margin-top:10px; font-size:13px; color:var(--text-2);">
      <span><span style="color:var(--danger);">●</span> High ${prio.high}</span>
      <span><span style="color:var(--warning);">●</span> Medium ${prio.medium}</span>
      <span><span style="color:var(--primary);">●</span> Low ${prio.low}</span>
    </div>
    <div style="text-align:center; font-size:12px; color:var(--text-2); margin-top:8px;">${totalP} active task${totalP === 1 ? "" : "s"} across the team</div>
  `;
}

function renderSummary() {
  const today = todayISO();
  const tasks = visibleTasks();
  const dt = new Date();
  document.getElementById("summaryDate").textContent =
    dt.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" });

  const dueToday = tasks.filter(t => t.due === today && t.status !== "done");
  const overdue = tasks.filter(t => t.due && t.due < today && t.status !== "done");
  const inprog = tasks.filter(t => t.status === "inprogress");
  const doneToday = tasks.filter(t => t.status === "done" && t.due === today);

  fillSection("sum-today", dueToday, "No tasks due today.");
  fillSection("sum-overdue", overdue, "Nothing overdue.");
  fillSection("sum-inprogress", inprog, "Nothing in progress.");
  fillSection("sum-done", doneToday, "No tasks completed today.");
  document.getElementById("badge-today").textContent = dueToday.length;
  document.getElementById("badge-overdue").textContent = overdue.length;
  document.getElementById("badge-inprogress").textContent = inprog.length;
  document.getElementById("badge-done").textContent = doneToday.length;
}
function fillSection(id, list, emptyMsg) {
  const el = document.getElementById(id);
  if (!list.length) {
    el.innerHTML = `<div class="card" style="color:var(--text-2); font-size:14px; text-align:center; padding:18px;">${emptyMsg}</div>`;
    return;
  }
  el.innerHTML = list.map(taskItemHTML).join("");
  bindTaskItems(el);
}

const $sheet = document.getElementById("taskSheet");
const $form = document.getElementById("taskForm");
const $tDelete = document.getElementById("tDelete");

function populateAssigneeOptions() {
  const sel = document.getElementById("tAssignee");
  const allowed = state.user.role === "Admin" ? USERS : USERS.filter(u => u.id === state.user.id);
  sel.innerHTML = allowed.map(u => `<option value="${u.id}">${escapeHtml(u.name)} — ${escapeHtml(u.role)}</option>`).join("");
}

function openSheet(id) {
  state.editingId = id ?? null;
  populateAssigneeOptions();
  document.getElementById("taskSheetTitle").textContent = id ? "Edit task" : "New task";
  $tDelete.classList.toggle("hidden", !id);
  if (id) {
    const t = state.tasks.find(x => x.id === id);
    if (!t) return;
    document.getElementById("tTitle").value = t.title;
    document.getElementById("tDesc").value = t.desc || "";
    document.getElementById("tAssignee").value = t.assignee;
    document.getElementById("tStatus").value = t.status;
    document.getElementById("tPriority").value = t.priority;
    document.getElementById("tDue").value = t.due || "";
  } else {
    $form.reset();
    document.getElementById("tStatus").value = "todo";
    document.getElementById("tPriority").value = "medium";
    document.getElementById("tAssignee").value = state.user.id;
  }
  $sheet.classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeSheet() {
  $sheet.classList.remove("open");
  state.editingId = null;
  document.body.style.overflow = "";
}
$sheet.addEventListener("click", (e) => { if (e.target === $sheet) closeSheet(); });
document.getElementById("taskSheetClose").addEventListener("click", closeSheet);
document.getElementById("fabAdd").addEventListener("click", () => openSheet(null));

$form.addEventListener("submit", (e) => {
  e.preventDefault();
  const title = document.getElementById("tTitle").value.trim();
  if (!title) return;
  const data = {
    title,
    desc: document.getElementById("tDesc").value.trim(),
    assignee: document.getElementById("tAssignee").value,
    status: document.getElementById("tStatus").value,
    priority: document.getElementById("tPriority").value,
    due: document.getElementById("tDue").value || null,
  };
  if (state.user.role !== "Admin") data.assignee = state.user.id;

  if (state.editingId) {
    const i = state.tasks.findIndex(t => t.id === state.editingId);
    if (i >= 0) state.tasks[i] = { ...state.tasks[i], ...data };
  } else {
    state.tasks.unshift({ id: uid(), createdAt: Date.now(), ...data });
  }
  saveTasks();
  closeSheet();
  render();
});
$tDelete.addEventListener("click", () => {
  if (!state.editingId) return;
  if (!confirm("Delete this task?")) return;
  state.tasks = state.tasks.filter(t => t.id !== state.editingId);
  saveTasks();
  closeSheet();
  render();
});

function toggleDone(id) {
  const t = state.tasks.find(x => x.id === id);
  if (!t) return;
  t.status = t.status === "done" ? "todo" : "done";
  saveTasks();
  render();
}

function render() {
  if (!state.user) return;
  if (state.view === "dashboard") renderDashboard();
  if (state.view === "tasks") renderTasks();
  if (state.view === "capacity") renderCapacity();
  if (state.view === "summary") renderSummary();
}

initTheme();
const session = loadSession();
if (session) {
  state.user = session;
  enterApp();
}
</script>
</body>
</html>
